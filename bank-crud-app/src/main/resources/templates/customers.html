<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer List</title>
</head>
<body>
<h2>Customer List</h2>
<table>
    <tr><th>ID</th><th>Name</th><th>Email</th><th>Balance</th><th>Action</th></tr>
    <tr th:each="cust : ${customers}">
        <td th:text="${cust.id}"></td>
        <td th:text="${cust.name}"></td>
        <td th:text="${cust.email}"></td>
        <td th:text="${cust.balance}"></td>
        <td><a th:href="@{/customers/delete/{id}(id=${cust.id})}">Delete</a></td>
    </tr>
</table>
<form action="/customers" method="post">
    Name: <input type="text" name="name"/>
    Email: <input type="text" name="email"/>
    Balance: <input type="number" name="balance"/>
    <button type="submit">Add</button>
</form>
</body>
</html>
